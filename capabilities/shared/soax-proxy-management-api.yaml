naftiko: "1.0.0-alpha1"

info:
  label: "SOAX Proxy Management API"
  description: >-
    SOAX Proxy Management API enables programmatic control of proxy packages — managing IP whitelists, configuring geo-targeting, and retrieving available cities, regions, carriers, and ISPs.
  tags:
    - SOAX
    - Proxy Management
    - IP Whitelist
    - Geo Targeting
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SOAX_API_KEY: SOAX_API_KEY
      SOAX_PACKAGE_KEY: SOAX_PACKAGE_KEY

capability:
  consumes:
    - type: http
      namespace: soax-proxy-mgmt
      baseUri: https://partner.api.soax.com
      description: "SOAX Partner API for proxy package management."
      authentication:
        type: apikey
        key: api-key
        value: "{{SOAX_API_KEY}}"
        placement: header
      resources:
        - name: ip-list
          path: /v1/account/package/{package_key}/ip-list
          description: "Retrieve whitelisted IPs for a package"
          operations:
            - name: list-whitelisted-ips
              method: GET
              description: "Get all whitelisted IP slots for a proxy package"
              inputParameters:
                - name: package_key
                  in: path
                  type: string
                  required: true
                  description: "Proxy package key"
              outputRawFormat: json
              outputParameters:
                - name: slots
                  type: object
                  value: "$.slots"

        - name: update-ip
          path: /v1/account/package/{package_key}/update-ip
          description: "Update whitelisted IP in a slot"
          operations:
            - name: update-whitelisted-ip
              method: POST
              description: "Add or update an IP address in a proxy whitelist slot"
              inputParameters:
                - name: package_key
                  in: path
                  type: string
                  required: true
                  description: "Proxy package key"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  - ip: "{{tools.ip}}"
                    slot: "{{tools.slot}}"
                    comment: "{{tools.comment}}"

        - name: detach-ip
          path: /v1/account/package/{package_key}/detach-ip
          description: "Remove whitelisted IP from a slot"
          operations:
            - name: detach-whitelisted-ip
              method: POST
              description: "Remove an IP address from a proxy whitelist slot"
              inputParameters:
                - name: package_key
                  in: path
                  type: string
                  required: true
                  description: "Proxy package key"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  - slot: "{{tools.slot}}"

        - name: cities
          path: /v1/geo/cities
          description: "Available cities for geo-targeting"
          operations:
            - name: list-cities
              method: GET
              description: "Get list of cities available for proxy geo-targeting"
              inputParameters:
                - name: country
                  in: query
                  type: string
                  required: false
                  description: "Filter by country code"
              outputRawFormat: json
              outputParameters:
                - name: cities
                  type: object
                  value: "$.cities"

        - name: regions
          path: /v1/geo/regions
          description: "Available regions for geo-targeting"
          operations:
            - name: list-regions
              method: GET
              description: "Get list of regions/states available for proxy geo-targeting"
              inputParameters:
                - name: country
                  in: query
                  type: string
                  required: false
                  description: "Filter by country code"
              outputRawFormat: json
              outputParameters:
                - name: regions
                  type: object
                  value: "$.regions"

        - name: carriers
          path: /v1/geo/carriers
          description: "Available mobile carriers for proxy targeting"
          operations:
            - name: list-carriers
              method: GET
              description: "Get list of mobile carriers available for mobile proxy targeting"
              inputParameters:
                - name: country
                  in: query
                  type: string
                  required: false
                  description: "Filter by country code"
              outputRawFormat: json
              outputParameters:
                - name: carriers
                  type: object
                  value: "$.carriers"

        - name: isps
          path: /v1/geo/isps
          description: "Available WiFi ISPs for residential proxy targeting"
          operations:
            - name: list-wifi-isps
              method: GET
              description: "Get list of WiFi ISPs available for residential proxy targeting"
              inputParameters:
                - name: country
                  in: query
                  type: string
                  required: false
                  description: "Filter by country code"
              outputRawFormat: json
              outputParameters:
                - name: isps
                  type: object
                  value: "$.isps"

  exposes:
    - type: rest
      port: 8101
      namespace: soax-proxy-mgmt-rest
      resources:
        - path: /v1/whitelist
          name: ip-whitelist
          description: "IP whitelist management"
          operations:
            - method: GET
              name: list-ips
              description: "List whitelisted IPs"
              call: "soax-proxy-mgmt.list-whitelisted-ips"
              with:
                package_key: "{{SOAX_PACKAGE_KEY}}"
              outputParameters:
                - type: object
                  mapping: "$.slots"

    - type: mcp
      port: 9101
      namespace: soax-proxy-mgmt-mcp
      transport: http
      tools:
        - name: list-whitelisted-ips
          description: "List all whitelisted IP slots for a SOAX proxy package"
          hints:
            readOnly: true
            openWorld: false
          call: "soax-proxy-mgmt.list-whitelisted-ips"
          with:
            package_key: "{{SOAX_PACKAGE_KEY}}"
          outputParameters:
            - type: object
              mapping: "$.slots"
        - name: list-cities
          description: "List cities available for SOAX proxy geo-targeting"
          hints:
            readOnly: true
            openWorld: false
          call: "soax-proxy-mgmt.list-cities"
          with:
            country: "tools.country"
          outputParameters:
            - type: object
              mapping: "$.cities"
        - name: list-regions
          description: "List regions/states available for SOAX proxy geo-targeting"
          hints:
            readOnly: true
            openWorld: false
          call: "soax-proxy-mgmt.list-regions"
          with:
            country: "tools.country"
          outputParameters:
            - type: object
              mapping: "$.regions"
        - name: list-mobile-carriers
          description: "List mobile carriers available for SOAX mobile proxy targeting"
          hints:
            readOnly: true
            openWorld: false
          call: "soax-proxy-mgmt.list-carriers"
          with:
            country: "tools.country"
          outputParameters:
            - type: object
              mapping: "$.carriers"
        - name: list-wifi-isps
          description: "List WiFi ISPs available for SOAX residential proxy targeting"
          hints:
            readOnly: true
            openWorld: false
          call: "soax-proxy-mgmt.list-wifi-isps"
          with:
            country: "tools.country"
          outputParameters:
            - type: object
              mapping: "$.isps"
