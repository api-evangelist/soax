naftiko: "1.0.0-alpha1"

info:
  label: "SOAX Web Data API"
  description: >-
    SOAX Web Data API extracts fully rendered HTML, screenshots, XHR responses, structured SERP data, and e-commerce product data from any public website. Handles JavaScript rendering, CAPTCHA bypass, and anti-bot circumvention automatically.
  tags:
    - SOAX
    - Web Scraping
    - Data Extraction
    - Anti-Bot Bypass
    - JavaScript Rendering
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SOAX_API_SECRET: SOAX_API_SECRET

capability:
  consumes:
    - type: http
      namespace: soax-web-data
      baseUri: https://scraping.soax.com
      description: "SOAX Web Data API for extracting content from any public website."
      authentication:
        type: apikey
        key: X-SOAX-API-Secret
        value: "{{SOAX_API_SECRET}}"
        placement: header
      resources:
        - name: web-content
          path: /v2/webdata/fetch-content
          description: "Fetch fully rendered content from any URL"
          operations:
            - name: fetch-web-content
              method: POST
              description: "Extract fully rendered HTML, screenshots, XHR, or Markdown from any public web page"
              inputParameters:
                - name: url
                  in: body
                  type: string
                  required: true
                  description: "Target URL to fetch"
                - name: country
                  in: body
                  type: string
                  required: false
                  description: "Country code for proxy geo-targeting"
                - name: proxy_type
                  in: body
                  type: integer
                  required: false
                  description: "Proxy type (1=residential, 2=mobile, 3=datacenter)"
                - name: return_body
                  in: body
                  type: boolean
                  required: false
                  description: "Return rendered HTML body"
                - name: return_screenshot
                  in: body
                  type: boolean
                  required: false
                  description: "Return PNG screenshot"
                - name: return_xhr
                  in: body
                  type: boolean
                  required: false
                  description: "Return XHR background responses"
                - name: return_markdown
                  in: body
                  type: boolean
                  required: false
                  description: "Return Markdown version of content"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  url: "{{tools.url}}"
                  proxy_settings:
                    country: "{{tools.country}}"
                    type: "{{tools.proxy_type}}"
                  response:
                    body: "{{tools.return_body}}"
                    screenshot: "{{tools.return_screenshot}}"
                    xhr: "{{tools.return_xhr}}"
                    markdown: "{{tools.return_markdown}}"

        - name: serp
          path: /v2/webdata/serp
          description: "Search engine result page extraction"
          operations:
            - name: fetch-serp-data
              method: POST
              description: "Extract search results from Google, Bing, and other search engines"
              inputParameters:
                - name: query
                  in: body
                  type: string
                  required: true
                  description: "Search query"
                - name: search_engine
                  in: body
                  type: string
                  required: true
                  description: "Target search engine (google, bing, yahoo)"
                - name: country
                  in: body
                  type: string
                  required: false
                  description: "Country for localized results"
              outputRawFormat: json
              outputParameters:
                - name: results
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  query: "{{tools.query}}"
                  search_engine: "{{tools.search_engine}}"
                  country: "{{tools.country}}"

        - name: ecommerce
          path: /v2/webdata/ecommerce
          description: "E-commerce product data extraction"
          operations:
            - name: fetch-ecommerce-data
              method: POST
              description: "Extract real-time pricing, stock, and product details from e-commerce sites"
              inputParameters:
                - name: url
                  in: body
                  type: string
                  required: true
                  description: "Product page URL"
                - name: extract
                  in: body
                  type: array
                  required: false
                  description: "Fields to extract (price, title, stock, rating, etc.)"
              outputRawFormat: json
              outputParameters:
                - name: product
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  url: "{{tools.url}}"
                  extract: "{{tools.extract}}"

  exposes:
    - type: rest
      port: 8100
      namespace: soax-web-data-rest
      resources:
        - path: /v1/fetch
          name: web-content
          description: "Fetch rendered web content"
          operations:
            - method: POST
              name: fetch-content
              description: "Extract content from any public URL"
              call: "soax-web-data.fetch-web-content"
              with:
                url: "rest.url"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/serp
          name: search-results
          description: "SERP data extraction"
          operations:
            - method: POST
              name: fetch-serp
              description: "Extract search engine results"
              call: "soax-web-data.fetch-serp-data"
              with:
                query: "rest.query"
                search_engine: "rest.search_engine"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: soax-web-data-mcp
      transport: http
      tools:
        - name: fetch-web-content
          description: "Extract fully rendered HTML from any public web page with anti-bot bypass"
          hints:
            readOnly: true
            openWorld: true
          call: "soax-web-data.fetch-web-content"
          with:
            url: "tools.url"
          outputParameters:
            - type: object
              mapping: "$."
        - name: fetch-serp-data
          description: "Extract search engine result pages from Google, Bing, or other engines"
          hints:
            readOnly: true
            openWorld: true
          call: "soax-web-data.fetch-serp-data"
          with:
            query: "tools.query"
            search_engine: "tools.search_engine"
          outputParameters:
            - type: object
              mapping: "$."
        - name: fetch-ecommerce-data
          description: "Extract real-time pricing and product details from e-commerce websites"
          hints:
            readOnly: true
            openWorld: true
          call: "soax-web-data.fetch-ecommerce-data"
          with:
            url: "tools.url"
          outputParameters:
            - type: object
              mapping: "$."
