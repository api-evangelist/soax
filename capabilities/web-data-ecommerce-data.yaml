naftiko: 1.0.0-alpha2
info:
  label: SOAX Web Data API — Ecommerce Data
  description: 'SOAX Web Data API — Ecommerce Data. 1 operations. Lead operation: Fetch Ecommerce Data. Self-contained Naftiko
    capability covering one Soax business surface.'
  tags:
  - Soax
  - Ecommerce Data
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SOAX_API_KEY: SOAX_API_KEY
capability:
  consumes:
  - type: http
    namespace: web-data-ecommerce-data
    baseUri: https://scraping.soax.com
    description: SOAX Web Data API — Ecommerce Data business capability. Self-contained, no shared references.
    resources:
    - name: v2-webdata-ecommerce
      path: /v2/webdata/ecommerce
      operations:
      - name: fetchecommercedata
        method: POST
        description: Fetch Ecommerce Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-SOAX-API-Secret
      value: '{{env.SOAX_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: web-data-ecommerce-data-rest
    port: 8080
    description: REST adapter for SOAX Web Data API — Ecommerce Data. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v2/webdata/ecommerce
      name: v2-webdata-ecommerce
      description: REST surface for v2-webdata-ecommerce.
      operations:
      - method: POST
        name: fetchecommercedata
        description: Fetch Ecommerce Data
        call: web-data-ecommerce-data.fetchecommercedata
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: web-data-ecommerce-data-mcp
    port: 9090
    transport: http
    description: MCP adapter for SOAX Web Data API — Ecommerce Data. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: fetch-ecommerce-data
      description: Fetch Ecommerce Data
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: web-data-ecommerce-data.fetchecommercedata
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
