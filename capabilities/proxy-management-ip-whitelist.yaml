    resources:
    - name: v1-account-package-package_key-detach-ip
      path: /v1/account/package/{package_key}/detach-ip
      operations:
      - name: detachwhitelistedip
        method: POST
        description: Detach Whitelisted IP
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: package_key
          in: path
          type: string
          description: Your proxy package key
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v1-account-package-package_key-ip-list
      path: /v1/account/package/{package_key}/ip-list
      operations:
      - name: listwhitelistedips
        method: GET
        description: List Whitelisted IPs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: package_key
          in: path
          type: string
          description: Your proxy package key from the SOAX dashboard
          required: true
    - name: v1-account-package-package_key-update-ip
      path: /v1/account/package/{package_key}/update-ip
      operations:
      - name: updatewhitelistedip
        method: POST
        description: Update Whitelisted IP
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: package_key
          in: path
          type: string
          description: Your proxy package key
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: api-key
      value: '{{env.SOAX_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: proxy-management-ip-whitelist-rest
    port: 8080
    description: REST adapter for SOAX Proxy Management API — IP Whitelist. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/account/package/{package-key}/detach-ip
      name: v1-account-package-package-key-detach-ip
      description: REST surface for v1-account-package-package_key-detach-ip.
      operations:
      - method: POST
        name: detachwhitelistedip
        description: Detach Whitelisted IP
        call: proxy-management-ip-whitelist.detachwhitelistedip
        with:
          package_key: rest.package_key
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/account/package/{package-key}/ip-list
      name: v1-account-package-package-key-ip-list
      description: REST surface for v1-account-package-package_key-ip-list.
