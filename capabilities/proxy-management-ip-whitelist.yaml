naftiko: 1.0.0-alpha2
info:
  label: SOAX Proxy Management API — IP Whitelist
  description: 'SOAX Proxy Management API — IP Whitelist. 3 operations. Lead operation: Detach Whitelisted IP. Self-contained
    Naftiko capability covering one Soax business surface.'
  tags:
  - Soax
  - IP Whitelist
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SOAX_API_KEY: SOAX_API_KEY
capability:
