        call: proxy-management-ip-whitelist.listwhitelistedips
        with:
          package_key: rest.package_key
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/account/package/{package-key}/update-ip
      name: v1-account-package-package-key-update-ip
      description: REST surface for v1-account-package-package_key-update-ip.
      operations:
